name: Build FIT performer

run-name: ${{ inputs.ref || github.ref_name }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - 'main'
    tags:
      - '*'
    paths:
      - 'performer/**'
      - 'sdk/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - '.github/workflows/fit-performer-image.yml'

  workflow_dispatch:
    inputs:
      ref:
        type: string
        description: "Performer version. Specify a branch, tag, full commit hash, GitHub PR like 'refs/pull/37/merge', or Gerrit PR like 'refs/changes/58/240858/6'"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: couchbaselabs/sdk-docker-build-action@v1
        with:
          sdk: rust
          ref: ${{ inputs.ref }}
          dockerfile: performer/Dockerfile
